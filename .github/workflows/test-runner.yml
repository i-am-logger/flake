name: Test Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  test-runner:
    name: Test Self-Hosted Runner
    runs-on: host-yoga-repo-flake

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: System information
        run: |
          echo "🖥️  Hostname: $(hostname)"
          echo "🐧 OS: $(uname -a)"
          echo "💾 Disk space:"
          df -h
          echo ""
          echo "🧠 Memory:"
          free -h

      - name: Check GPU availability
        run: |
          if command -v rocm-smi &> /dev/null; then
            echo "🎮 AMD GPU detected:"
            rocm-smi
          elif command -v nvidia-smi &> /dev/null; then
            echo "🎮 NVIDIA GPU detected:"
            nvidia-smi
          else
            echo "ℹ️  No GPU tools found (rocm-smi or nvidia-smi)"
          fi

      - name: Docker availability
        run: |
          echo "🐳 Docker version:"
          docker --version
          echo ""
          echo "🐳 Docker info:"
          docker info

      - name: Container test
        run: |
          echo "📦 Testing container capabilities..."
          echo "Current working directory: $(pwd)"
          echo "User: $(whoami)"
          echo "Available shells: $(cat /etc/shells 2>/dev/null || echo 'N/A')"

      - name: Runner labels
        run: |
          echo "🏷️  This runner has the following labels:"
          echo "  - self-hosted"
          echo "  - host-$(hostname)"
          echo "  - repo-flake"

      - name: Success message
        run: |
          echo "✅ Self-hosted runner test completed successfully!"
          echo "🎉 Runner is working properly on $(hostname)"
